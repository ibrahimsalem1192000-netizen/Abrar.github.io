<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abrar ❤️</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top, #fff0f6 0%, #ffd9e8 45%, #ffc2da 100%);
      position: relative;
    }

    .bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .flower, .heart, .medical {
      position: absolute;
      opacity: 0.22;
      animation: float 7s ease-in-out infinite;
      user-select: none;
    }

    .flower { font-size: 34px; }
    .heart { font-size: 30px; }
    .medical { font-size: 28px; }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-18px) rotate(8deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    .card {
      position: relative;
      z-index: 2;
      width: 92%;
      max-width: 620px;
      background: rgba(255,255,255,0.95);
      border: 3px solid #ffd1df;
      border-radius: 28px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.12);
      padding: 32px 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 44px;
      color: #d81b60;
    }

    .subtitle {
      font-size: 30px;
      color: #ad1457;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .desc {
      font-size: 20px;
      color: #7a294f;
      margin-bottom: 26px;
    }

    .buttons {
      position: relative;
      height: 130px;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 15px 30px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #yesBtn {
      background: linear-gradient(135deg, #ff4f8b, #ff77a8);
      color: white;
      box-shadow: 0 8px 20px rgba(255, 79, 139, 0.35);
      margin-right: 12px;
    }

    #yesBtn:hover {
      transform: scale(1.08);
    }

    #noBtn {
      position: absolute;
      background: #ffe3ec;
      color: #b03060;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      top: 20px;
      left: 65%;
    }

    .result {
      display: none;
      margin-top: 26px;
      animation: pop 0.4s ease;
    }

    .result h2 {
      color: #d81b60;
      font-size: 29px;
      margin-bottom: 10px;
    }

    .result p {
      color: #8e2451;
      font-size: 22px;
      margin: 0;
      line-height: 1.8;
    }

    .roses {
      margin-top: 16px;
      font-size: 34px;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.75); }
      to { opacity: 1; transform: scale(1); }
    }

    .confetti {
      position: fixed;
      top: -20px;
      z-index: 9999;
      animation: fall linear forwards;
      user-select: none;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 1;
      }
    }

    .footer {
      margin-top: 16px;
      color: #b85c82;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="bg">
    <!-- More flowers -->
    <div class="flower" style="top:5%; right:8%;">🌹</div>
    <div class="flower" style="top:12%; left:10%;">🌸</div>
    <div class="flower" style="top:20%; right:20%;">🌺</div>
    <div class="flower" style="top:30%; left:6%;">🌷</div>
    <div class="flower" style="top:40%; right:10%;">💐</div>
    <div class="flower" style="top:52%; left:14%;">🌹</div>
    <div class="flower" style="top:65%; right:18%;">🌸</div>
    <div class="flower" style="top:76%; left:8%;">🌺</div>
    <div class="flower" style="top:83%; right:6%;">🌷</div>
    <div class="flower" style="top:10%; left:42%;">💐</div>
    <div class="flower" style="top:72%; left:42%;">🌹</div>
    <div class="flower" style="top:22%; right:44%;">🌸</div>

    <!-- Hearts -->
    <div class="heart" style="top:8%; left:28%;">❤️</div>
    <div class="heart" style="top:58%; right:34%;">💖</div>
    <div class="heart" style="top:82%; left:28%;">💕</div>
    <div class="heart" style="top:18%; right:34%;">💗</div>

    <!-- Medical icons -->
    <div class="medical" style="top:15%; right:70%;">🩺</div>
    <div class="medical" style="top:60%; left:74%;">💊</div>
    <div class="medical" style="top:38%; right:80%;">🫀</div>
    <div class="medical" style="top:86%; left:70%;">📋</div>
  </div>

  <div class="card">
    <h1>Abrar</h1>
    <div class="subtitle">Prabiro 💖</div>
    <div class="desc">Do you love me?</div>

    <div class="buttons" id="buttonArea">
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </div>

    <div class="result" id="resultBox">
      <h2>You wanted to say you love me? 😎❤️</h2>
      <p>I knew it, I knew it!</p>
      <div class="roses">🌹🌹🌹💐💖✨🎉</div>
    </div>

    <div class="footer">For the beautiful heart doctor 👩‍⚕️🫀</div>
  </div>

  <audio id="celebrateSound" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=success-fanfare-trumpets-6185.mp3" type="audio/mpeg">
  </audio>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const resultBox = document.getElementById("resultBox");
    const buttonArea = document.getElementById("buttonArea");
    const celebrateSound = document.getElementById("celebrateSound");

    function moveNoButton() {
      const maxX = buttonArea.clientWidth - noBtn.offsetWidth;
      const maxY = buttonArea.clientHeight - noBtn.offsetHeight;
      const x = Math.random() * maxX;
      const y = Math.random() * maxY;
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("click", moveNoButton);
    noBtn.addEventListener("touchstart", function(e) {
      e.preventDefault();
      moveNoButton();
    });

    function launchConfetti() {
      const emojis = ["🎉", "✨", "🎊", "💖", "🌹"];
      for (let i = 0; i < 80; i++) {
        const conf = document.createElement("div");
        conf.className = "confetti";
        conf.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.animationDuration = (2 + Math.random() * 3) + "s";
        conf.style.fontSize = (18 + Math.random() * 16) + "px";
        document.body.appendChild(conf);

        setTimeout(() => {
          conf.remove();
        }, 5000);
      }
    }

    yesBtn.addEventListener("click", () => {
      resultBox.style.display = "block";
      yesBtn.innerText = "Of course 😍";
      celebrateSound.currentTime = 0;
      celebrateSound.play().catch(() => {});
      launchConfetti();
    });
  </script>

</body>
</html>
